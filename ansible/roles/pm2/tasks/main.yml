---
- name: Install pm2 globally via npm
  community.general.npm:
    name: pm2
    global: true
    state: present

- name: Deploy pm2-start.sh
  copy:
    src: pm2-start.sh
    dest: /home/ubuntu/pm2-start.sh
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Deploy pm2 systemd service
  template:
    src: pm2-ubuntu.service.j2
    dest: /etc/systemd/system/pm2-ubuntu.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable pm2-ubuntu service
  systemd:
    name: pm2-ubuntu
    enabled: true
    daemon_reload: true
