- name: Check running pm2 processes
  command: pm2 jlist
  become: true
  become_user: ubuntu
  register: pm2_processes
  changed_when: false

- name: Start website process
  command: pm2 start npm --name website -- start
  args:
    chdir: /app/platform/website
  become: true
  become_user: ubuntu
  when: "'website' not in pm2_processes.stdout"

- name: Start api process
  command: >
    pm2 start "uv run uvicorn main:app --host 0.0.0.0 --port 8000"
    --name api
  args:
    chdir: /app/platform/backend
  become: true
  become_user: ubuntu
  when: "'\"name\":\"api\"' not in pm2_processes.stdout"

- name: Save pm2 process list
  command: pm2 save
  become: true
  become_user: ubuntu
  changed_when: false
